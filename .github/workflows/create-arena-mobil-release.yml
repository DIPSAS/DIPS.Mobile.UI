name: Create Arena Mobil Release

on:
  workflow_dispatch:
    inputs:
      arena_mobil_version:
        description: 'Arena Mobil version (e.g. 4.4.0)'
        required: true
        default: '4.4.0'
      commit_sha:
        description: 'Commit SHA to tag (full SHA of the DUI version commit)'
        required: true
        default: 'e5fbfae8d8f16c83c83f59ba5715a2d97dd4525d'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create Arena Mobil release
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ inputs.arena_mobil_version }}';
            const commitSha = '${{ inputs.commit_sha }}';
            const tagName = `arena-mobil-${version}`;
            const releaseName = `Arena Mobil ${version}`;
            const body = `This version of DUI was used in Arena Mobil ${version} app.`;
            try {
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tagName,
                target_commitish: commitSha,
                name: releaseName,
                body: body,
                draft: false,
                prerelease: false
              });
              console.log(`Release ${tagName} created successfully`);
            } catch (e) {
              const isAlreadyExistsError =
                e.status === 422 &&
                Array.isArray(e.response?.data?.errors) &&
                e.response.data.errors.some(error => error?.code === 'already_exists');

              if (isAlreadyExistsError) {
                console.log(`Release ${tagName} already exists, skipping.`);
              } else {
                throw e;
              }
            }
