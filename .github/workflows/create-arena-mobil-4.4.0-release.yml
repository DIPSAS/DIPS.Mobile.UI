name: Create Arena Mobil 4.4.0 Release

on:
  push:
    branches:
      - 'copilot/create-arena-mobile-release-tag'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create arena-mobil-4.4.0 release
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: 'arena-mobil-4.4.0',
                target_commitish: 'e5fbfae8d8f16c83c83f59ba5715a2d97dd4525d',
                name: 'Arena Mobil 4.4.0',
                body: 'This version of DUI was used in Arena Mobil 4.4.0 app.',
                draft: false,
                prerelease: false
              });
              console.log('Release arena-mobil-4.4.0 created successfully');
            } catch (e) {
              if (e.status === 422) {
                console.log('Release arena-mobil-4.4.0 already exists, skipping.');
              } else {
                throw e;
              }
            }
